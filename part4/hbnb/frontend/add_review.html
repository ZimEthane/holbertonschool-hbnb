<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HBNB - Ajouter un avis">
  <link rel="icon" type="image/png" href="/images/icon.png">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/add-review.css">
  <title>HBNB - Ajouter un Avis</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
</head>
<body>
  <header>
    <div class="header-left">
      <img src="/images/logo.png" alt="HBNB Logo" class="logo">
      <nav>
        <a href="/index.html">Accueil</a>
        <a href="/about.html">Aide</a>
      </nav>
    </div>
    <button class="login-button" id="headerLoginBtn">Connexion</button>
  </header>

  <main class="container">
    <div class="review-form-container">
      <div class="back-link">
        <a href="javascript:history.back()">← Retour</a>
      </div>

      <div id="authCheck" class="auth-check">
        <p>Vous devez être connecté pour ajouter un avis</p>
        <button class="login-button" onclick="window.location.href='/login.html'">Se connecter</button>
      </div>

      <div id="reviewFormContent" class="hidden">
        <h1>📝 Ajouter votre avis</h1>

        <div class="form-section">
          <h3>Évaluation</h3>
          <div class="rating-display" id="ratingDisplay">★ 5</div>
          <div class="stars-rating" id="starsContainer">
            <span class="star active" data-rating="1">★</span>
            <span class="star active" data-rating="2">★</span>
            <span class="star active" data-rating="3">★</span>
            <span class="star active" data-rating="4">★</span>
            <span class="star active" data-rating="5">★</span>
          </div>
        </div>

        <form class="add-review form" id="addReviewForm">
          <h3>Détails de votre avis</h3>

          <div class="form-group">
            <label for="reviewComment">Votre avis détaillé</label>
            <textarea
              id="reviewComment"
              name="comment"
              required
              placeholder="Décrivez votre expérience..."
              class="textarea-large"
            ></textarea>
          </div>

          <div class="form-buttons">
            <button type="submit">✓ Soumettre l'avis</button>
            <button type="reset">✕ Annuler</button>
          </div>
        </form>

        <div id="successMessage" class="hidden" style="color: #4caf50; padding: 20px; text-align: center;">
          ✓ Avis soumis avec succès!
        </div>

        <div id="errorMessage" class="hidden" style="color: #d32f2f; padding: 20px; text-align: center;">
          ✕ Erreur lors de la soumission
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 HBNB. Tous droits réservés.</p>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/add-review.js"></script>
</body>
</html>
