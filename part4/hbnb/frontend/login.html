<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HBNB - Connexion">
  <link rel="icon" type="image/png" href="/images/icon.png">
  <title>HBNB - Connexion</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex justify-between items-center gap-8">
      <div class="flex items-center gap-8">
        <img src="/images/logo.png" alt="HBNB" class="h-8 w-auto">
        <nav class="hidden md:flex gap-8">
          <a href="/index.html" class="font-medium text-gray-700 hover:text-red-500 transition-colors">Accueil</a>
          <a href="/about.html" class="font-medium text-gray-700 hover:text-red-500 transition-colors">Aide</a>
        </nav>
      </div>
      <button id="headerLoginBtn" class="px-6 py-2 text-gray-900 font-medium hover:text-red-500 transition-colors border border-gray-300 hover:border-red-500 rounded-lg" disabled>Connexion</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex items-center justify-center min-h-[calc(100vh-120px)] px-4 py-12">
    <form id="loginForm" class="w-full max-w-md bg-white rounded-lg shadow-sm border border-gray-200 p-8 md:p-10">
      <h1 class="text-3xl font-bold mb-2 text-gray-900">Connexion</h1>
      <p class="text-gray-600 mb-8">Connectez-vous pour accéder à votre compte</p>

      <div class="mb-6">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="votre@email.com"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-200 transition-all"
        >
      </div>

      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          placeholder="••••••••"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-200 transition-all"
        >
      </div>

      <div class="flex items-center justify-between mb-8">
        <label class="flex items-center text-sm text-gray-700">
          <input type="checkbox" name="remember" class="w-4 h-4 border border-gray-300 rounded cursor-pointer">
          <span class="ml-2">Se souvenir de moi</span>
        </label>
        <a href="#" class="text-sm text-red-500 hover:text-red-600 font-medium">Mot de passe oublié?</a>
      </div>

      <button type="submit" class="w-full bg-red-500 text-white font-semibold py-2.5 rounded-lg hover:bg-red-600 transition-colors mb-6">Connexion</button>

      <div class="flex items-center gap-4 mb-6">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-sm text-gray-500 font-medium">OU</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-8">
        <button type="button" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 font-medium text-gray-700 transition-colors">Google</button>
        <button type="button" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 font-medium text-gray-700 transition-colors">Facebook</button>
      </div>

      <p class="text-center text-gray-600 text-sm">
        Pas encore inscrit? <a href="/register.html" class="text-red-500 hover:text-red-600 font-semibold">Créer un compte</a>
      </p>
    </form>
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 mt-16 py-8">
    <div class="max-w-7xl mx-auto px-4 md:px-6 text-center text-gray-500 text-sm">
      <p>&copy; 2026 HBNB. Tous droits réservés.</p>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
