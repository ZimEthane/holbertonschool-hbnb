<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HBNB - Connexion">
  <link rel="icon" type="image/png" href="/images/icon.png">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/login.css">
  <title>HBNB - Connexion</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
</head>
<body>
  <header>
    <div class="header-left">
      <img src="/images/logo.png" alt="HBNB Logo" class="logo">
      <nav>
        <a href="/index.html">Accueil</a>
        <a href="/about.html">Aide</a>
      </nav>
    </div>
    <button class="login-button" id="headerLoginBtn" disabled>Connexion</button>
  </header>

  <main class="login-container">
    <form class="login-form" id="loginForm">
      <h1>Connexion</h1>
      <p>Connectez-vous pour accéder à votre compte</p>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="votre@email.com"
        >
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          placeholder="••••••••"
        >
      </div>

      <div class="remember-forgot">
        <label>
          <input type="checkbox" name="remember"> Se souvenir de moi
        </label>
        <a href="#">Mot de passe oublié?</a>
      </div>

      <button type="submit" class="login-btn">Connexion</button>

      <div class="divider"><span>OU</span></div>

      <div class="social-buttons">
        <button type="button">Google</button>
        <button type="button">Facebook</button>
      </div>

      <div class="signup-link">
        Pas encore inscrit? <a href="/register.html">Créer un compte</a>
      </div>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 HBNB. Tous droits réservés.</p>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
