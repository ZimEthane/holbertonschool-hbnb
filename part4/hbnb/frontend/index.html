<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HBNB - Your home away from home">
  <link rel="icon" type="image/png" href="/images/icon.png">
  <link rel="stylesheet" href="/css/style.css">
  <title>HBNB - Places</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
</head>
<body>
  <header>
    <div class="header-left">
      <img src="/images/logo.png" alt="HBNB Logo" class="logo">
      <nav>
        <a href="/index.html">Accueil</a>
        <a href="/about.html">Aide</a>
      </nav>
    </div>
    <button class="login-button" id="headerLoginBtn">Connexion</button>
  </header>

  <main class="container">
    <h1>Découvrez nos meilleures locations</h1>
    <p class="subtitle">Trouvez votre maison idéale parmi nos sélections de propriétés</p>

    <div class="filters">
      <label for="priceFilter">Filtrer par prix (par nuit):</label>
      <select id="priceFilter" class="price-filter">
        <option value="">Tous les prix</option>
        <option value="10">Jusqu'à 10€</option>
        <option value="50">Jusqu'à 50€</option>
        <option value="100">Jusqu'à 100€</option>
      </select>
    </div>

    <div class="places-grid" id="placesGrid">
      <!-- Les places seront chargées ici via JavaScript -->
    </div>
  </main>

  <footer>
    <p>&copy; 2026 HBNB. Tous droits réservés.</p>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/index.js"></script>
</body>
</html>
