<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HBNB - Locations de vacances">
  <link rel="icon" type="image/png" href="/images/icon.png">
  <title>HBNB - Locations de vacances</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex flex-col min-h-screen">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex justify-between items-center gap-8">
      <div class="flex items-center gap-8">
        <img src="/images/logo.png" alt="HBNB" class="h-8 w-auto">
        <nav class="hidden md:flex gap-8">
          <a href="/index.html" class="font-medium text-gray-700 hover:text-red-500 transition-colors">Accueil</a>
          <a href="/about.html" class="font-medium text-gray-700 hover:text-red-500 transition-colors">Aide</a>
        </nav>
      </div>
      <button id="headerLoginBtn" class="px-6 py-2 text-gray-900 font-medium hover:text-red-500 transition-colors border border-gray-300 hover:border-red-500 rounded-lg">Connexion</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 max-w-7xl mx-auto w-full px-4 md:px-6 py-8 md:py-12">
    <!-- Hero Section -->
    <div class="mb-12">
      <h1 class="text-4xl md:text-5xl font-bold mb-3 text-gray-900">Découvrez les meilleures locations</h1>
      <p class="text-lg text-gray-600">Trouvez votre <span class="text-red-500 font-semibold">maison idéale</span> pour vos prochaines vacances</p>
    </div>

    <!-- Filters -->
    <div class="mb-10 pb-8 border-b border-gray-200">
      <div class="flex flex-col gap-4">
        <h2 class="text-lg font-bold text-gray-900">🔍 Filtres</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
          <!-- Prix Filter -->
          <div class="space-y-2">
            <label for="priceFilter" class="block text-sm font-semibold text-gray-700">Prix maximum par nuit</label>
            <select id="priceFilter" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-white text-gray-900 font-medium hover:border-red-500 focus:outline-none focus:ring-2 focus:ring-red-200 focus:border-transparent transition-all cursor-pointer">
              <option value="">💰 Tous les prix</option>
              <option value="10">Jusqu'à 10€</option>
              <option value="50">Jusqu'à 50€</option>
              <option value="100">Jusqu'à 100€</option>
              <option value="100+">Plus de 100€</option>
            </select>
          </div>

          <!-- Tri par prix -->
          <div class="space-y-2">
            <label for="sortPrice" class="block text-sm font-semibold text-gray-700">Trier par prix</label>
            <select id="sortPrice" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-white text-gray-900 font-medium hover:border-red-500 focus:outline-none focus:ring-2 focus:ring-red-200 focus:border-transparent transition-all cursor-pointer">
              <option value="">📊 Défaut</option>
              <option value="asc">⬆️ Prix croissant</option>
              <option value="desc">⬇️ Prix décroissant</option>
            </select>
          </div>

          <!-- Tri par notation -->
          <div class="space-y-2">
            <label for="sortRating" class="block text-sm font-semibold text-gray-700">Trier par note</label>
            <select id="sortRating" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-white text-gray-900 font-medium hover:border-red-500 focus:outline-none focus:ring-2 focus:ring-red-200 focus:border-transparent transition-all cursor-pointer">
              <option value="">⭐ Défaut</option>
              <option value="desc">⭐ Meilleures notes d'abord</option>
              <option value="asc">⭐ Notes les plus basses</option>
            </select>
          </div>

          <!-- Search Input -->
          <div class="space-y-2">
            <label for="searchInput" class="block text-sm font-semibold text-gray-700">Rechercher</label>
            <input type="text" id="searchInput" placeholder="Nom de location..." class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-white text-gray-900 placeholder-gray-500 font-medium hover:border-red-500 focus:outline-none focus:ring-2 focus:ring-red-200 focus:border-transparent transition-all">
          </div>
        </div>

        <!-- Reset Button -->
        <div class="flex justify-end">
          <button id="resetFiltersBtn" class="px-4 py-2 bg-gray-200 text-gray-900 font-semibold rounded-lg hover:bg-gray-300 transition-colors">🔄 Réinitialiser</button>
        </div>
      </div>
    </div>

    <!-- Places Grid -->
    <div id="placesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Places loaded by JavaScript -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 mt-16 py-8">
    <div class="max-w-7xl mx-auto px-4 md:px-6 text-center text-gray-500 text-sm">
      <p>&copy; 2026 HBNB. Tous droits réservés.</p>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/index.js"></script>
</body>
</html>
